<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2ec7c9"/>
      <stop offset="50%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#8e2de2"/>
    </linearGradient>
  </defs>

  <!-- Circular C -->
  <circle cx="256" cy="256" r="200"
          fill="none"
          stroke="url(#grad)"
          stroke-width="60"
          stroke-linecap="round"
          stroke-dasharray="1100 300"
          transform="rotate(-40 256 256)"/>

  <!-- Dot of i -->
  <circle cx="256" cy="190" r="28" fill="url(#grad)" />

  <!-- Body of i -->
  <rect x="232" y="230" width="48" height="130" rx="24" fill="url(#grad)" />
</svg>
